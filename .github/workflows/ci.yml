name: CI

on:
  push:
    branches:
      - '**'

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sdk: ${{ steps.filter.outputs.sdk }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            sdk:
              - 'sdk/java/**'

  # ── Backend ────────────────────────────────────────────────
  backend-build:
    name: Backend — Build & Test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests with coverage
        run: mvn clean test -B
        working-directory: ./backend

      - name: Parse JaCoCo coverage
        id: coverage
        working-directory: ./backend
        run: |
          TOTAL=$(awk -F',' 'NR>1 { missed += $8; covered += $9 } END { printf "%d", (covered * 100 / (missed + covered)) }' target/site/jacoco/jacoco.csv)
          COUNT=$(grep 'Tests run:' target/surefire-reports/*.txt | sed 's/.*Tests run: \([0-9]*\).*/\1/' | awk '{s+=$1} END {print s}')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "tests=$COUNT" >> $GITHUB_OUTPUT
          echo "Coverage: ${TOTAL}%, Tests: ${COUNT}"

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && env.GIST_SECRET != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: togli-backend-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.total }}%
          valColorRange: ${{ steps.coverage.outputs.total }}
          minColorRange: 40
          maxColorRange: 80
        env:
          GIST_SECRET: ${{ secrets.GIST_SECRET }}

      - name: Update tests badge
        if: github.ref == 'refs/heads/main' && env.GIST_SECRET != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: togli-backend-tests.json
          label: tests
          message: ${{ steps.coverage.outputs.tests }} passed
          color: brightgreen
        env:
          GIST_SECRET: ${{ secrets.GIST_SECRET }}

      - name: Docker build check
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false

  # ── Frontend ───────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
        working-directory: ./frontend

      - run: flutter build web --release
        working-directory: ./frontend

  # ── Java SDK ──────────────────────────────────────────────
  sdk-build:
    name: SDK — Build & Test
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests with coverage
        run: mvn clean test -B
        working-directory: ./sdk/java

      - name: Parse JaCoCo coverage
        id: sdk-coverage
        working-directory: ./sdk/java
        run: |
          TOTAL=$(awk -F',' 'NR>1 { missed += $8; covered += $9 } END { printf "%d", (covered * 100 / (missed + covered)) }' target/site/jacoco/jacoco.csv)
          COUNT=$(grep 'Tests run:' target/surefire-reports/*.txt | sed 's/.*Tests run: \([0-9]*\).*/\1/' | awk '{s+=$1} END {print s}')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "tests=$COUNT" >> $GITHUB_OUTPUT
          echo "Coverage: ${TOTAL}%, Tests: ${COUNT}"

      - name: Update SDK coverage badge
        if: github.ref == 'refs/heads/main' && env.GIST_SECRET != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: togli-sdk-coverage.json
          label: coverage
          message: ${{ steps.sdk-coverage.outputs.total }}%
          valColorRange: ${{ steps.sdk-coverage.outputs.total }}
          minColorRange: 30
          maxColorRange: 70
        env:
          GIST_SECRET: ${{ secrets.GIST_SECRET }}

      - name: Update SDK tests badge
        if: github.ref == 'refs/heads/main' && env.GIST_SECRET != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: togli-sdk-tests.json
          label: tests
          message: ${{ steps.sdk-coverage.outputs.tests }} passed
          color: brightgreen
        env:
          GIST_SECRET: ${{ secrets.GIST_SECRET }}
