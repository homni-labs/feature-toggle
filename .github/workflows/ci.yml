name: CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'backend/**'
      - 'frontend/**'
    tags:
      - 'v*'

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false

  backend-release:
    name: Backend — Release
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs: backend-build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/homni-feature-toggle:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/homni-feature-toggle:latest

  # ── Frontend ───────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
        working-directory: ./frontend

      - run: flutter build web --release
        working-directory: ./frontend
