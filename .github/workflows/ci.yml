name: CI

on:
  push:
    branches:
      - '**'

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false

  # ── Frontend ───────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
        working-directory: ./frontend

      - run: flutter build web --release
        working-directory: ./frontend

  # ── Java SDK ──────────────────────────────────────────────
  sdk-build:
    name: SDK — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - run: mvn verify -B
        working-directory: ./sdk/java

