name: CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'backend/**'
      - 'frontend/**'

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false

  # ── Frontend ───────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
        working-directory: ./frontend

      - run: flutter build web --release
        working-directory: ./frontend
