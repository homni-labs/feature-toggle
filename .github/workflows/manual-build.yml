name: Manual Build

on:
  workflow_dispatch:
    inputs:
      component:
        description: Component to build
        required: true
        type: choice
        options:
          - all
          - backend
          - frontend
          - sdk

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend-build:
    name: Backend — Build & Test
    if: inputs.component == 'backend' || inputs.component == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests with coverage
        run: mvn clean test -B
        working-directory: ./backend

      - name: Parse JaCoCo coverage
        id: coverage
        working-directory: ./backend
        run: |
          TOTAL=$(awk -F',' 'NR>1 { missed += $8; covered += $9 } END { printf "%d", (covered * 100 / (missed + covered)) }' target/site/jacoco/jacoco.csv)
          COUNT=$(grep 'Tests run:' target/surefire-reports/*.txt | sed 's/.*Tests run: \([0-9]*\).*/\1/' | awk '{s+=$1} END {print s}')
          echo "Coverage: ${TOTAL}%, Tests: ${COUNT}"

      - name: Docker build check
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false

  # ── Frontend ───────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    if: inputs.component == 'frontend' || inputs.component == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
        working-directory: ./frontend

      - run: flutter build web --release
        working-directory: ./frontend

  # ── Java SDK ──────────────────────────────────────────────
  sdk-build:
    name: SDK — Build & Test
    if: inputs.component == 'sdk' || inputs.component == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests with coverage
        run: mvn clean test -B
        working-directory: ./sdk/java

      - name: Parse SDK coverage
        working-directory: ./sdk/java
        run: |
          TOTAL=$(awk -F',' 'NR>1 { missed += $8; covered += $9 } END { printf "%d", (covered * 100 / (missed + covered)) }' target/site/jacoco/jacoco.csv)
          COUNT=$(grep 'Tests run:' target/surefire-reports/*.txt | sed 's/.*Tests run: \([0-9]*\).*/\1/' | awk '{s+=$1} END {print s}')
          echo "Coverage: ${TOTAL}%, Tests: ${COUNT}"
