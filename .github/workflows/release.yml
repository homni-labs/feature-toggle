name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  backend-release:
    name: Backend — Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/homni-feature-toggle:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/homni-feature-toggle:latest
