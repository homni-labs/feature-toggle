name: Release

on:
  push:
    tags:
      - 'backend/v*'
      - 'frontend/v*'
      - 'sdk/java/v*'

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend-release:
    name: Backend — Build & Push
    if: startsWith(github.ref, 'refs/tags/backend/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#backend/v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            zaytsevdv/togli-backend:${{ steps.version.outputs.VERSION }}
            zaytsevdv/togli-backend:latest

  # ── Frontend ───────────────────────────────────────────────
  frontend-release:
    name: Frontend — Build & Push
    if: startsWith(github.ref, 'refs/tags/frontend/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#frontend/v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            zaytsevdv/togli-frontend:${{ steps.version.outputs.VERSION }}
            zaytsevdv/togli-frontend:latest

  # ── Java SDK (GitHub Packages) ─────────────────────────────
  sdk-release:
    name: SDK — Publish to GitHub Packages
    if: startsWith(github.ref, 'refs/tags/sdk/java/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/java/v}"
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -B
        working-directory: ./sdk/java

      - name: Build & Test
        run: mvn clean install -B
        working-directory: ./sdk/java

      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests -B
        working-directory: ./sdk/java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
