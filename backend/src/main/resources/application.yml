server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: homni-feature-toggle-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:homni_feature_toggle}
    username: ${DB_USER:homni}
    password: ${DB_PASSWORD:homni}
  liquibase:
    change-log: classpath:db/changelog/changelog-master.xml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8180/realms/feature-toggle}

app:
  oidc:
    default-admin-email: ${OIDC_ADMIN_EMAIL:admin@homni.local}
  cors:
    allowed-origins: ${CORS_ORIGINS:*}
  environments:
    defaults: ${APP_DEFAULT_ENVIRONMENTS:DEV,TEST,PROD}
  observability:
    enabled: ${OBSERVABILITY_ENABLED:true}
    prometheus-url: ${PROMETHEUS_URL:http://localhost:9090}

springdoc:
  swagger-ui:
    path: /docs

logging:
  level:
    com.homni: ${LOG_LEVEL:DEBUG}

management:
  prometheus:
    metrics:
      export:
        enabled: ${OBSERVABILITY_ENABLED:true}
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    prometheus:
      enabled: ${OBSERVABILITY_ENABLED:true}
  metrics:
    tags:
      application: feature_toggle_backend
    distribution:
      percentiles-histogram:
        http.server.requests: true
