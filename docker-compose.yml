services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: homni_feature_toggle
      POSTGRES_USER: homni
      POSTGRES_PASSWORD: homni
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homni -d homni_feature_toggle"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./sso/keycloak/feature-toggle-realm.json:/opt/keycloak/data/import/feature-toggle-realm.json:ro
      - ./sso/keycloak/themes/feature-toggle:/opt/keycloak/themes/feature-toggle:ro
    restart: unless-stopped

  backend:
    build: ./backend
    image: zaytsevdv/homni-feature-toggle:latest
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: homni_feature_toggle
      DB_USER: homni
      DB_PASSWORD: homni
      OIDC_ISSUER_URI: http://keycloak:8080/realms/feature-toggle
      OIDC_ADMIN_EMAIL: admin@homni.local
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
