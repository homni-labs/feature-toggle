services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: homni_togli
      POSTGRES_USER: homni
      POSTGRES_PASSWORD: homni
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homni -d homni_togli"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm --metrics-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
      - "9000:9000"
    volumes:
      - ./sso/keycloak/togli-realm.json:/opt/keycloak/data/import/togli-realm.json:ro
      - ./sso/keycloak/themes/dark-theme:/opt/keycloak/themes/dark-theme:ro
      - ./sso/keycloak/themes/light-theme:/opt/keycloak/themes/light-theme:ro
    restart: unless-stopped

  backend:
    build: ./backend
    image: zaytsevdv/homni-togli:latest
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: homni_togli
      DB_USER: homni
      DB_PASSWORD: homni
      OIDC_ISSUER_URI: http://keycloak:8080/realms/togli
      OIDC_ADMIN_EMAIL: admin@homni.local
      CORS_ORIGINS: http://localhost:3000
      APP_DEFAULT_ENVIRONMENTS: DEV,TEST,PROD
      OBSERVABILITY_ENABLED: true
      PROMETHEUS_URL: http://prometheus:9090
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Observability ---

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=500MB'
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.0
    environment:
      DATA_SOURCE_NAME: "postgresql://homni:homni@postgres:5432/homni_togli?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  pgdata:
  prometheus-data:
  loki-data:
  grafana-data:
