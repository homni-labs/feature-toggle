server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP: unsafe-inline/unsafe-eval required by Flutter web (canvaskit WASM)
    # connect-src: backend API + Keycloak OIDC — update for production URLs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:8080 http://localhost:8180; img-src 'self' data:; worker-src 'self' blob:;" always;

    server_tokens off;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 256;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (hashed filenames — safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html (always fresh on deploy)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
