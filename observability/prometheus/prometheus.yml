global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'feature_toggle_backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: 'feature_toggle_backend'

  - job_name: 'keycloak'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['keycloak:9000']
        labels:
          service: 'keycloak'

  - job_name: 'postgres'
    scrape_interval: 15s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
