server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: kubernetes-pods
    static_configs:
      - targets:
          - localhost
        labels:
          job: kubernetes-pods
          __path__: /var/log/pods/**/*.log
    pipeline_stages:
      - cri: {}
      - regex:
          source: filename
          expression: /var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_.+/(?P<container>[^/]+)/.+
      - labels:
          namespace:
          pod:
          container:
      - template:
          source: service_name
          template: '{{ .container }}'
      - labels:
          service_name:
